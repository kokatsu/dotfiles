name: PR

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  detect-rerun:
    name: Detect hash-update rerun
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      already_updated: ${{ steps.check.outputs.already_updated }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Skip the auto-update job for commits this workflow itself pushed.
          # Author-email match covers any current or future bot commit prefix in
          # one place, instead of duplicating commit subjects between the job
          # that produces them and this gate.
          AUTHOR_EMAIL=$(gh api "repos/${REPO}/commits/${SHA}" --jq '.commit.author.email')
          if [[ "$AUTHOR_EMAIL" == "github-actions[bot]@users.noreply.github.com" ]]; then
            echo "already_updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_updated=false" >> "$GITHUB_OUTPUT"
          fi

  update-hashes:
    name: Update hashes for Renovate PR
    needs: detect-rerun
    permissions:
      contents: write
    # Only run for Renovate PRs from this repo (not forks) with expected branch naming
    if: >-
      github.event.pull_request.user.login == 'renovate[bot]' && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.head_ref, 'renovate/') && needs.detect-rerun.outputs.already_updated != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.RENOVATE_PUSH_TOKEN }}

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Detect changed packages
        id: detect
        run: |
          # Validate version strings to prevent shell injection via crafted overlay content.
          # Allowed: digits, letters, dots, plus, underscore, hyphen (covers standard semver + pre-release).
          validate_version() {
            local name="$1" val="$2"
            if ! [[ "$val" =~ ^[0-9a-zA-Z.+_-]+$ ]]; then
              echo "::error::Invalid version format for $name: $val"
              exit 1
            fi
          }

          # Get the diff to detect which packages were changed
          git fetch origin main
          DIFF=$(git diff origin/main -- nix/overlays/)
          PACKAGES=""

          # Check each package independently
          if echo "$DIFF" | grep -q 'cssmodules-language-server'; then
            echo "has_cssmodules_language_server=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 20 "# Renovate:.*depName=.*cssmodules-language-server" "nix/overlays/source-builds.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "cssmodules-language-server" "$VERSION"
            echo "version_cssmodules_language_server=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }cssmodules-language-server $VERSION"
          fi

          if echo "$DIFF" | grep -q 'vite-plus'; then
            echo "has_vite_plus=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 20 "# Renovate:.*depName=vite-plus" "nix/overlays/npm-packages.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "vite-plus" "$VERSION"
            echo "version_vite_plus=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }vite-plus $VERSION"
          fi

          if echo "$DIFF" | grep -q 'textlint-rule-preset-ai-writing'; then
            echo "has_textlint_rule_preset_ai_writing=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 20 "# Renovate:.*depName=@textlint-ja/textlint-rule-preset-ai-writing" "nix/overlays/npm-packages.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "textlint-rule-preset-ai-writing" "$VERSION"
            echo "version_textlint_rule_preset_ai_writing=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }textlint-rule-preset-ai-writing $VERSION"
          fi

          if echo "$DIFF" | grep -q 'codex'; then
            echo "has_codex=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 30 "# Renovate:.*depName=openai/codex" "nix/overlays/binary-releases.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "codex" "$VERSION"
            echo "version_codex=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }codex $VERSION"
          fi

          if echo "$DIFF" | grep -q 'win32yank'; then
            echo "has_win32yank=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 20 "# Renovate:.*depName=.*win32yank" "nix/overlays/standalone.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "win32yank" "$VERSION"
            echo "version_win32yank=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }win32yank $VERSION"
          fi

          if echo "$DIFF" | grep -q 'x-api-playground'; then
            echo "has_x_api_playground=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 20 "# Renovate:.*depName=.*playground" "nix/overlays/source-builds.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "x-api-playground" "$VERSION"
            echo "version_x_api_playground=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }x-api-playground $VERSION"
          fi

          if echo "$DIFF" | grep -q 'claude-code'; then
            echo "has_claude_code=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 20 "# Renovate:.*depName=claude-code" "nix/overlays/binary-releases.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "claude-code" "$VERSION"
            echo "version_claude_code=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }claude-code $VERSION"
          fi

          # karabiner-config/ lives outside nix/overlays/, so check it with a separate path-scoped diff
          KARABINER_FILES=$(git diff --name-only origin/main -- karabiner-config/)
          if echo "$KARABINER_FILES" | grep -qE '^karabiner-config/(deno\.json|deno\.lock)$'; then
            echo "has_karabinerts_deno_lock=true" >> $GITHUB_OUTPUT
          fi

          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT

      # === Pre-built binary packages ===

      - name: Update claude-code hashes
        if: steps.detect.outputs.has_claude_code == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_claude_code }}
        run: |
          OVERLAY="nix/overlays/binary-releases.nix"
          MANIFEST_URL="https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases/${VERSION}/manifest.json"

          # Get hashes from manifest and convert to SRI format (sha256-...)
          MANIFEST=$(curl -fsSL "$MANIFEST_URL")

          # Function to convert hex hash to SRI format
          hex_to_sri() {
            echo -n "sha256-$(echo "$1" | xxd -r -p | base64 | tr -d '\n')"
          }

          HASH_DARWIN_ARM64=$(hex_to_sri "$(echo "$MANIFEST" | jq -r '.platforms["darwin-arm64"].checksum')")
          HASH_DARWIN_X64=$(hex_to_sri "$(echo "$MANIFEST" | jq -r '.platforms["darwin-x64"].checksum')")
          HASH_LINUX_ARM64=$(hex_to_sri "$(echo "$MANIFEST" | jq -r '.platforms["linux-arm64"].checksum')")
          HASH_LINUX_X64=$(hex_to_sri "$(echo "$MANIFEST" | jq -r '.platforms["linux-x64"].checksum')")

          # Update claude-code section only
          sed -i '/# Claude Code - agentic coding tool/,/^  };/{
            s|"aarch64-darwin" = "sha256-[^"]*"|"aarch64-darwin" = "'"${HASH_DARWIN_ARM64}"'"|
            s|"x86_64-darwin" = "sha256-[^"]*"|"x86_64-darwin" = "'"${HASH_DARWIN_X64}"'"|
            s|"aarch64-linux" = "sha256-[^"]*"|"aarch64-linux" = "'"${HASH_LINUX_ARM64}"'"|
            s|"x86_64-linux" = "sha256-[^"]*"|"x86_64-linux" = "'"${HASH_LINUX_X64}"'"|
          }' "$OVERLAY"

      # === NPM packages with buildNpmPackage ===

      - name: Update vite-plus hashes
        if: steps.detect.outputs.has_vite_plus == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_vite_plus }}
        run: |
          OVERLAY="nix/overlays/npm-packages.nix"
          LOCK_DIR="nix/npm-locks/vite-plus"

          # vite-plus's tarball references private workspace packages in its own
          # devDependencies, so we vendor a wrapper package.json that depends on
          # vite-plus@<version> and regenerate package-lock.json from it.
          # --legacy-peer-deps must mirror npmFlags in npm-packages.nix.
          jq --arg v "$VERSION" '.dependencies."vite-plus" = $v' \
            "$LOCK_DIR/package.json" > /tmp/vite-plus-wrapper.json
          mv /tmp/vite-plus-wrapper.json "$LOCK_DIR/package.json"

          mkdir -p /tmp/vite-plus-pkg
          cp "$LOCK_DIR/package.json" /tmp/vite-plus-pkg/
          cd /tmp/vite-plus-pkg
          npm install --package-lock-only --ignore-scripts --legacy-peer-deps
          cp package-lock.json "$GITHUB_WORKSPACE/$LOCK_DIR/"
          cd "$GITHUB_WORKSPACE"

          # Compute npmDepsHash using prefetch-npm-deps
          NPM_HASH=$(nix run nixpkgs#prefetch-npm-deps -- "$LOCK_DIR/package-lock.json" 2>/dev/null)
          sed -i "/vite-plus = _final: prev: let/,/^  };/{s|npmDepsHash = \"sha256-[^\"]*\"|npmDepsHash = \"${NPM_HASH}\"|}" "$OVERLAY"

      - name: Update textlint-rule-preset-ai-writing hashes
        if: steps.detect.outputs.has_textlint_rule_preset_ai_writing == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_textlint_rule_preset_ai_writing }}
        run: |
          OVERLAY="nix/overlays/npm-packages.nix"
          LOCK_DIR="nix/npm-locks/textlint-rule-preset-ai-writing"

          # Scoped npm package vendored via a wrapper package.json that depends on
          # @textlint-ja/textlint-rule-preset-ai-writing@<version>; regenerate the lock.
          # No special npm flags here, mirroring npm-packages.nix (no npmFlags).
          jq --arg v "$VERSION" '.dependencies."@textlint-ja/textlint-rule-preset-ai-writing" = $v' \
            "$LOCK_DIR/package.json" > /tmp/ai-writing-wrapper.json
          mv /tmp/ai-writing-wrapper.json "$LOCK_DIR/package.json"

          mkdir -p /tmp/ai-writing-pkg
          cp "$LOCK_DIR/package.json" /tmp/ai-writing-pkg/
          cd /tmp/ai-writing-pkg
          npm install --package-lock-only --ignore-scripts
          cp package-lock.json "$GITHUB_WORKSPACE/$LOCK_DIR/"
          cd "$GITHUB_WORKSPACE"

          # Compute npmDepsHash using prefetch-npm-deps
          NPM_HASH=$(nix run nixpkgs#prefetch-npm-deps -- "$LOCK_DIR/package-lock.json" 2>/dev/null)
          sed -i "/textlint-rule-preset-ai-writing = _final: prev: let/,/^  };/{s|npmDepsHash = \"sha256-[^\"]*\"|npmDepsHash = \"${NPM_HASH}\"|}" "$OVERLAY"

      - name: Update cssmodules-language-server hashes
        if: steps.detect.outputs.has_cssmodules_language_server == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_cssmodules_language_server }}
        run: |
          OVERLAY="nix/overlays/source-builds.nix"

          # Compute GitHub source hash
          SRC_HASH=$(nix-prefetch-url --unpack --type sha256 \
            "https://github.com/antonk52/cssmodules-language-server/archive/refs/tags/v${VERSION}.tar.gz" 2>/dev/null | \
            xargs nix hash convert --hash-algo sha256 --to sri)
          sed -i "/cssmodules-language-server = _final: prev: {/,/^  };/{s|hash = \"sha256-[^\"]*\";|hash = \"${SRC_HASH}\";|}" "$OVERLAY"

          # Clone and compute npmDepsHash
          git clone --depth 1 --branch "v${VERSION}" \
            https://github.com/antonk52/cssmodules-language-server.git /tmp/cssmodules-ls
          cd /tmp/cssmodules-ls
          npm install --package-lock-only --ignore-scripts
          NPM_HASH=$(nix run nixpkgs#prefetch-npm-deps -- package-lock.json 2>/dev/null)
          cd "$GITHUB_WORKSPACE"
          sed -i "/cssmodules-language-server = _final: prev: {/,/^  };/{s|npmDepsHash = \"sha256-[^\"]*\"|npmDepsHash = \"${NPM_HASH}\"|}" "$OVERLAY"

      # === Binary releases (prefetch) ===
      # hashSource="prefetch" の mkBinaryRelease パッケージは全て同形 (artifact を
      # nix-prefetch-url して hash 算出) なので、flake の hashUpdateManifest を使い
      # 1 ステップで汎用処理する。バージョンが origin/main と異なるものだけ更新し、
      # URL は overlay の url 関数 (manifest 経由) を再利用するため CI 側に URL や
      # platform を再記述しない。新しい prefetch バイナリ追加時もこのステップは不変。
      # claude-code / codex は publisher 公開 checksum を使うため対象外 (別ステップ)。
      - name: Update prefetch binary hashes
        id: update_prefetch
        run: |
          OVERLAY="nix/overlays/binary-releases.nix"
          MANIFEST=$(nix eval --json .#hashUpdateManifest)

          git fetch origin main
          OLDFILE=$(mktemp)
          git show origin/main:"$OVERLAY" > "$OLDFILE"

          # mkBinaryRelease セクションから pkg ($2) のバージョンを取り出す。
          # ubuntu-latest の awk は mawk なので gawk 専用の match(...,arr) は使わず、
          # verify ステップの deck パーサと同じ POSIX sed 方式で抽出する。
          extract_ver() {
            sed -n "/^  $2 = mkBinaryRelease/,/^  };/{s/.*version = \"\([^\"]*\)\".*/\1/p;}" "$1" | head -1
          }

          CHANGED=""
          while IFS=$'\t' read -r pkg curver; do
            # overlay 由来のバージョンをシェルへ展開する前に検証 (インジェクション対策)
            if ! [[ "$curver" =~ ^[0-9a-zA-Z.+_-]+$ ]]; then
              echo "::error::Invalid version format for $pkg: $curver"
              exit 1
            fi
            oldver=$(extract_ver "$OLDFILE" "$pkg")
            [ "$curver" = "$oldver" ] && continue

            echo "::group::Update $pkg ($oldver -> $curver)"
            while IFS=$'\t' read -r sys url; do
              HASH=$(nix-prefetch-url --type sha256 "$url" 2>/dev/null | xargs nix hash convert --hash-algo sha256 --to sri)
              if [ -z "$HASH" ]; then
                echo "::error::prefetch failed for $pkg ($sys): $url"
                exit 1
              fi
              sed -i "/^  ${pkg} = mkBinaryRelease/,/^  };/{s|\"${sys}\" = \"sha256-[^\"]*\"|\"${sys}\" = \"${HASH}\"|}" "$OVERLAY"
            done < <(echo "$MANIFEST" | jq -r --arg p "$pkg" '.[$p].targets | to_entries[] | [.key, .value.url] | @tsv')
            CHANGED="${CHANGED:+$CHANGED, }$pkg $curver"
            echo "::endgroup::"
          done < <(echo "$MANIFEST" | jq -r 'to_entries[] | select(.value.hashSource == "prefetch") | [.key, .value.version] | @tsv')

          rm -f "$OLDFILE"
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Update codex hashes
        if: steps.detect.outputs.has_codex == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_codex }}
        run: |
          OVERLAY="nix/overlays/binary-releases.nix"
          SUMS=$(curl -fsSL "https://github.com/openai/codex/releases/download/rust-v${VERSION}/codex-package_SHA256SUMS")

          for platform in "aarch64-apple-darwin:aarch64-darwin" "x86_64-apple-darwin:x86_64-darwin" \
                          "aarch64-unknown-linux-musl:aarch64-linux" "x86_64-unknown-linux-musl:x86_64-linux"; do
            PLAT_NAME="${platform%%:*}"
            NIX_SYSTEM="${platform##*:}"
            FILE="codex-package-${PLAT_NAME}.tar.gz"
            HEX=$(echo "$SUMS" | awk -v file="$FILE" '$2 == file {print $1}')
            if [ -z "$HEX" ]; then
              echo "::error::Could not find $FILE in codex-package_SHA256SUMS"
              exit 1
            fi
            HASH=$(nix hash convert --hash-algo sha256 --to sri "$HEX")
            sed -i "/codex = mkBinaryRelease/,/^  };/{s|\"${NIX_SYSTEM}\" = \"sha256-[^\"]*\"|\"${NIX_SYSTEM}\" = \"${HASH}\"|}" "$OVERLAY"
          done

      - name: Update win32yank hashes
        if: steps.detect.outputs.has_win32yank == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_win32yank }}
        run: |
          OVERLAY="nix/overlays/standalone.nix"
          URL="https://github.com/equalsraf/win32yank/releases/download/v${VERSION}/win32yank-x64.zip"
          # fetchzip uses unpacked hash (--unpack)
          HASH=$(nix-prefetch-url --unpack --type sha256 "$URL" 2>/dev/null | xargs nix hash convert --hash-algo sha256 --to sri)
          sed -i "/win32yank = _final: prev:/,/^  };/{s|hash = \"sha256-[^\"]*\";|hash = \"${HASH}\";|}" "$OVERLAY"

      - name: Update x-api-playground hashes
        if: steps.detect.outputs.has_x_api_playground == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_x_api_playground }}
        run: |
          OVERLAY="nix/overlays/source-builds.nix"

          # Compute GitHub source hash
          SRC_HASH=$(nix-prefetch-url --unpack --type sha256 \
            "https://github.com/xdevplatform/playground/archive/refs/tags/v${VERSION}.tar.gz" 2>/dev/null | \
            xargs nix hash convert --hash-algo sha256 --to sri)
          sed -i "/x-api-playground = _final: prev: {/,/^  };/{s|hash = \"sha256-[^\"]*\";|hash = \"${SRC_HASH}\";|}" "$OVERLAY"

          # Compute vendorHash using FOD trick
          FAKE_HASH="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          sed -i "/x-api-playground = _final: prev: {/,/^  };/{s|vendorHash = \"sha256-[^\"]*\";|vendorHash = \"${FAKE_HASH}\";|}" "$OVERLAY"
          VENDOR_HASH=$(nix build --no-link --impure --expr '
            let pkgs = import (builtins.getFlake "nixpkgs") {
              system = "x86_64-linux";
              overlays = [ (import ./nix/overlays).x-api-playground ];
            };
            in pkgs.x-api-playground
          ' 2>&1 | grep -oP "got:\s+\Ksha256-\S+" | head -1)
          if [ -n "$VENDOR_HASH" ]; then
            sed -i "/x-api-playground = _final: prev: {/,/^  };/{s|vendorHash = \"sha256-[^\"]*\";|vendorHash = \"${VENDOR_HASH}\";|}" "$OVERLAY"
          else
            echo "::error::Failed to compute vendorHash for x-api-playground"
            exit 1
          fi

      - name: Format code
        run: nix fmt -- .

      - name: Verify all hashes in overlay
        run: |
          ERRORS=0

          # mkBinaryRelease 製パッケージは全て flake の hashUpdateManifest が
          # 「全プラットフォームの url + 現在 overlay に書かれた hash」を一括提供する。
          # fetchurl は生ファイルを hash 化するため、format に依らず nix-prefetch-url
          # (--unpack なし) だけで照合できる。新しい binary ツールを追加しても overlay
          # 定義だけでこのループに自動で乗る (ここは不変)。
          MANIFEST=$(nix eval --json .#hashUpdateManifest)
          while IFS=$'\t' read -r pkg sys url expected; do
            actual=$(nix-prefetch-url --type sha256 "$url" 2>/dev/null | xargs nix hash convert --hash-algo sha256 --to sri)
            if [ -z "$actual" ]; then
              echo "::warning::$pkg ($sys): could not fetch $url"
              continue
            fi
            if [ "$actual" != "$expected" ]; then
              echo "::error::$pkg ($sys): hash mismatch! overlay=$expected actual=$actual"
              ERRORS=$((ERRORS + 1))
            else
              echo "$pkg ($sys): OK"
            fi
          done < <(echo "$MANIFEST" | jq -r '
            to_entries[] | .key as $p | .value.targets | to_entries[]
            | [$p, .key, .value.url, .value.hash] | @tsv')

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::${ERRORS} hash mismatch(es) found. The sed-based hash update likely failed."
            exit 1
          fi
          echo "All hashes verified successfully."

      - name: Sync flake.lock for flake.nix tag pins
        id: sync-flake
        run: bash scripts/sync-flake-inputs.sh "$GITHUB_OUTPUT"

      # === karabiner-config deno.lock regeneration ===
      # Renovate's Deno manager appends new-version hashes to deno.lock without
      # removing the old ones, leaving stale entries that pile up on every bump.
      # Regenerate the lockfile here so it can be committed in the same push as
      # the nix-hash updates below — a separate push would race against
      # concurrency.cancel-in-progress when the first push fires synchronize.

      - name: Setup Deno
        if: steps.detect.outputs.has_karabinerts_deno_lock == 'true'
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5

      - name: Regenerate karabiner-config deno.lock
        if: steps.detect.outputs.has_karabinerts_deno_lock == 'true'
        working-directory: karabiner-config
        run: |
          rm -f deno.lock
          deno cache karabiner.ts
          test -f deno.lock || { echo "::error::deno cache did not produce deno.lock"; exit 1; }

      - name: Commit and push changes
        env:
          PACKAGES: ${{ steps.detect.outputs.packages }}
          PREFETCH_PACKAGES: ${{ steps.update_prefetch.outputs.changed }}
          EXTRA_PACKAGES: ${{ steps.sync-flake.outputs.extra_packages }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          pushed=false

          # Stage nix overlay / flake.lock updates first, excluding deno.lock so
          # it ships as its own chore commit below with a meaningful subject.
          if ! git diff --quiet -- ':!karabiner-config/deno.lock'; then
            git add -A -- ':!karabiner-config/deno.lock'
            # 各 detect/update ステップが出す "name X, name Y" 断片を ", " で連結する
            MSG=""
            for part in "$PACKAGES" "$PREFETCH_PACKAGES" "$EXTRA_PACKAGES"; do
              [ -n "$part" ] && MSG="${MSG:+$MSG, }$part"
            done
            git commit -m "fix: update nix hashes for $MSG"
            pushed=true
          fi

          if ! git diff --quiet karabiner-config/deno.lock; then
            git add karabiner-config/deno.lock
            git commit -m "chore(karabiner): regenerate deno.lock"
            pushed=true
          fi

          if [[ "$pushed" == "true" ]]; then
            git push
          else
            echo "No changes to commit"
          fi

  check:
    name: Check
    needs: update-hashes
    permissions:
      contents: read
    if: always() && needs.update-hashes.result != 'failure' && needs.update-hashes.result != 'cancelled'
    uses: ./.github/workflows/check.yml
    with:
      ref: ${{ github.head_ref }}
    secrets:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
