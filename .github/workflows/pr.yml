name: PR

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  update-hashes:
    name: Update hashes for Renovate PR
    permissions:
      contents: write
    # Only run for Renovate PRs from this repo (not forks) with expected branch naming
    if: >-
      github.event.pull_request.user.login == 'renovate[bot]' && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.head_ref, 'renovate/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.RENOVATE_PUSH_TOKEN }}

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Detect changed packages
        id: detect
        run: |
          # Validate version strings to prevent shell injection via crafted overlay content.
          # Allowed: digits, letters, dots, plus, underscore, hyphen (covers standard semver + pre-release).
          validate_version() {
            local name="$1" val="$2"
            if ! [[ "$val" =~ ^[0-9a-zA-Z.+_-]+$ ]]; then
              echo "::error::Invalid version format for $name: $val"
              exit 1
            fi
          }

          # Get the diff to detect which packages were changed
          git fetch origin main
          DIFF=$(git diff origin/main -- nix/overlays/)
          PACKAGES=""

          # Check each package independently
          if echo "$DIFF" | grep -q 'termframe'; then
            echo "has_termframe=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 20 "# Renovate:.*depName=.*termframe" "nix/overlays/binary-releases.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "termframe" "$VERSION"
            echo "version_termframe=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }termframe $VERSION"
          fi

          if echo "$DIFF" | grep -q 'deck'; then
            echo "has_deck=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 20 "# Renovate:.*depName=.*deck" "nix/overlays/standalone.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "deck" "$VERSION"
            echo "version_deck=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }deck $VERSION"
          fi

          if echo "$DIFF" | grep -q 'cssmodules-language-server'; then
            echo "has_cssmodules_language_server=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 20 "# Renovate:.*depName=.*cssmodules-language-server" "nix/overlays/source-builds.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "cssmodules-language-server" "$VERSION"
            echo "version_cssmodules_language_server=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }cssmodules-language-server $VERSION"
          fi

          if echo "$DIFF" | grep -q 'unocss-language-server'; then
            echo "has_unocss_language_server=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 20 "# Renovate:.*depName=.*unocss-language-server" "nix/overlays/npm-packages.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "unocss-language-server" "$VERSION"
            echo "version_unocss_language_server=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }unocss-language-server $VERSION"
          fi

          if echo "$DIFF" | grep -q 'kakehashi'; then
            echo "has_kakehashi=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 20 "# Renovate:.*depName=.*kakehashi" "nix/overlays/binary-releases.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "kakehashi" "$VERSION"
            echo "version_kakehashi=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }kakehashi $VERSION"
          fi

          if echo "$DIFF" | grep -q 'octorus'; then
            echo "has_octorus=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 20 "# Renovate:.*depName=.*octorus" "nix/overlays/binary-releases.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "octorus" "$VERSION"
            echo "version_octorus=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }octorus $VERSION"
          fi

          if echo "$DIFF" | grep -q '\bdcd\b\|DCD'; then
            echo "has_dcd=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 20 "# Renovate:.*depName=.*DCD" "nix/overlays/binary-releases.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "dcd" "$VERSION"
            echo "version_dcd=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }dcd $VERSION"
          fi

          if echo "$DIFF" | grep -q 'rgx'; then
            echo "has_rgx_cli=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 20 "# Renovate:.*depName=.*rgx" "nix/overlays/binary-releases.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "rgx-cli" "$VERSION"
            echo "version_rgx_cli=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }rgx-cli $VERSION"
          fi

          if echo "$DIFF" | grep -q 'win32yank'; then
            echo "has_win32yank=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 20 "# Renovate:.*depName=.*win32yank" "nix/overlays/standalone.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "win32yank" "$VERSION"
            echo "version_win32yank=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }win32yank $VERSION"
          fi

          if echo "$DIFF" | grep -q 'x-api-playground'; then
            echo "has_x_api_playground=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 20 "# Renovate:.*depName=.*playground" "nix/overlays/source-builds.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "x-api-playground" "$VERSION"
            echo "version_x_api_playground=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }x-api-playground $VERSION"
          fi

          if echo "$DIFF" | grep -q 'claude-code'; then
            echo "has_claude_code=true" >> $GITHUB_OUTPUT
            VERSION=$(grep -A 20 "# Renovate:.*depName=claude-code" "nix/overlays/binary-releases.nix" | grep -oP 'version = "\K[^"]+' | head -1)
            validate_version "claude-code" "$VERSION"
            echo "version_claude_code=$VERSION" >> $GITHUB_OUTPUT
            PACKAGES="${PACKAGES:+$PACKAGES, }claude-code $VERSION"
          fi

          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT

      # === Pre-built binary packages ===

      - name: Update termframe hashes
        if: steps.detect.outputs.has_termframe == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_termframe }}
        run: |
          OVERLAY="nix/overlays/binary-releases.nix"

          # Compute hashes for each platform
          for platform in "macos-arm64:aarch64-darwin" "macos-x86_64:x86_64-darwin" \
                          "linux-arm64-gnu:aarch64-linux" "linux-x86_64-gnu:x86_64-linux"; do
            PLAT_NAME="${platform%%:*}"
            NIX_SYSTEM="${platform##*:}"
            URL="https://github.com/pamburus/termframe/releases/download/v${VERSION}/termframe-${PLAT_NAME}.tar.gz"
            HASH=$(nix-prefetch-url --type sha256 "$URL" 2>/dev/null | xargs nix hash convert --hash-algo sha256 --to sri)
            sed -i "/termframe = mkBinaryRelease/,/^  };/{s|\"${NIX_SYSTEM}\" = \"sha256-[^\"]*\"|\"${NIX_SYSTEM}\" = \"${HASH}\"|}" "$OVERLAY"
          done

      - name: Update claude-code hashes
        if: steps.detect.outputs.has_claude_code == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_claude_code }}
        run: |
          OVERLAY="nix/overlays/binary-releases.nix"
          MANIFEST_URL="https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases/${VERSION}/manifest.json"

          # Get hashes from manifest and convert to SRI format (sha256-...)
          MANIFEST=$(curl -fsSL "$MANIFEST_URL")

          # Function to convert hex hash to SRI format
          hex_to_sri() {
            echo -n "sha256-$(echo "$1" | xxd -r -p | base64 | tr -d '\n')"
          }

          HASH_DARWIN_ARM64=$(hex_to_sri "$(echo "$MANIFEST" | jq -r '.platforms["darwin-arm64"].checksum')")
          HASH_DARWIN_X64=$(hex_to_sri "$(echo "$MANIFEST" | jq -r '.platforms["darwin-x64"].checksum')")
          HASH_LINUX_ARM64=$(hex_to_sri "$(echo "$MANIFEST" | jq -r '.platforms["linux-arm64"].checksum')")
          HASH_LINUX_X64=$(hex_to_sri "$(echo "$MANIFEST" | jq -r '.platforms["linux-x64"].checksum')")

          # Update claude-code section only
          sed -i '/# Claude Code - agentic coding tool/,/^  };/{
            s|"aarch64-darwin" = "sha256-[^"]*"|"aarch64-darwin" = "'"${HASH_DARWIN_ARM64}"'"|
            s|"x86_64-darwin" = "sha256-[^"]*"|"x86_64-darwin" = "'"${HASH_DARWIN_X64}"'"|
            s|"aarch64-linux" = "sha256-[^"]*"|"aarch64-linux" = "'"${HASH_LINUX_ARM64}"'"|
            s|"x86_64-linux" = "sha256-[^"]*"|"x86_64-linux" = "'"${HASH_LINUX_X64}"'"|
          }' "$OVERLAY"

      - name: Update deck hashes
        if: steps.detect.outputs.has_deck == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_deck }}
        run: |
          OVERLAY="nix/overlays/standalone.nix"

          # Compute hashes for each platform
          for platform in "darwin_arm64.zip:aarch64-darwin" "darwin_amd64.zip:x86_64-darwin" \
                          "linux_arm64.tar.gz:aarch64-linux" "linux_amd64.tar.gz:x86_64-linux"; do
            PLAT_NAME="${platform%%:*}"
            NIX_SYSTEM="${platform##*:}"
            URL="https://github.com/k1LoW/deck/releases/download/v${VERSION}/deck_v${VERSION}_${PLAT_NAME}"
            HASH=$(nix-prefetch-url --type sha256 "$URL" 2>/dev/null | xargs nix hash convert --hash-algo sha256 --to sri)
            sed -i "/deck = _final: prev:/,/^  };/{s|\"${NIX_SYSTEM}\" = \"sha256-[^\"]*\"|\"${NIX_SYSTEM}\" = \"${HASH}\"|}" "$OVERLAY"
          done

      # === NPM packages with buildNpmPackage ===

      - name: Update unocss-language-server hashes
        if: steps.detect.outputs.has_unocss_language_server == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_unocss_language_server }}
        run: |
          OVERLAY="nix/overlays/npm-packages.nix"
          LOCK_DIR="nix/npm-locks/unocss-language-server"

          # Update tarball hash
          URL="https://registry.npmjs.org/unocss-language-server/-/unocss-language-server-${VERSION}.tgz"
          TARBALL_HASH=$(nix-prefetch-url --type sha256 "$URL" 2>/dev/null | xargs nix hash convert --hash-algo sha256 --to sri)
          sed -i "/unocss-language-server = _final: prev: let/,/^  };/{s|hash = \"sha256-[^\"]*\";|hash = \"${TARBALL_HASH}\";|}" "$OVERLAY"

          # Regenerate package-lock.json
          mkdir -p /tmp/unocss-ls-pkg
          curl -fsSL "$URL" | tar -xzf - -C /tmp/unocss-ls-pkg --strip-components=1
          cd /tmp/unocss-ls-pkg
          npm install --package-lock-only --ignore-scripts
          cp package-lock.json "$GITHUB_WORKSPACE/$LOCK_DIR/"
          cd "$GITHUB_WORKSPACE"

          # Compute npmDepsHash using prefetch-npm-deps
          NPM_HASH=$(nix run nixpkgs#prefetch-npm-deps -- "$LOCK_DIR/package-lock.json" 2>/dev/null)
          sed -i "/unocss-language-server = _final: prev: let/,/^  };/{s|npmDepsHash = \"sha256-[^\"]*\"|npmDepsHash = \"${NPM_HASH}\"|}" "$OVERLAY"

      - name: Update cssmodules-language-server hashes
        if: steps.detect.outputs.has_cssmodules_language_server == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_cssmodules_language_server }}
        run: |
          OVERLAY="nix/overlays/source-builds.nix"

          # Compute GitHub source hash
          SRC_HASH=$(nix-prefetch-url --unpack --type sha256 \
            "https://github.com/antonk52/cssmodules-language-server/archive/refs/tags/v${VERSION}.tar.gz" 2>/dev/null | \
            xargs nix hash convert --hash-algo sha256 --to sri)
          sed -i "/cssmodules-language-server = _final: prev: {/,/^  };/{s|hash = \"sha256-[^\"]*\";|hash = \"${SRC_HASH}\";|}" "$OVERLAY"

          # Clone and compute npmDepsHash
          git clone --depth 1 --branch "v${VERSION}" \
            https://github.com/antonk52/cssmodules-language-server.git /tmp/cssmodules-ls
          cd /tmp/cssmodules-ls
          npm install --package-lock-only --ignore-scripts
          NPM_HASH=$(nix run nixpkgs#prefetch-npm-deps -- package-lock.json 2>/dev/null)
          cd "$GITHUB_WORKSPACE"
          sed -i "/cssmodules-language-server = _final: prev: {/,/^  };/{s|npmDepsHash = \"sha256-[^\"]*\"|npmDepsHash = \"${NPM_HASH}\"|}" "$OVERLAY"

      # === Source-built packages ===

      - name: Update kakehashi hashes
        if: steps.detect.outputs.has_kakehashi == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_kakehashi }}
        run: |
          OVERLAY="nix/overlays/binary-releases.nix"

          # Compute hashes for each platform
          for platform in "aarch64-apple-darwin:aarch64-darwin" "x86_64-apple-darwin:x86_64-darwin" \
                          "aarch64-unknown-linux-gnu:aarch64-linux" "x86_64-unknown-linux-gnu:x86_64-linux"; do
            PLAT_NAME="${platform%%:*}"
            NIX_SYSTEM="${platform##*:}"
            URL="https://github.com/atusy/kakehashi/releases/download/v${VERSION}/kakehashi-v${VERSION}-${PLAT_NAME}.tar.gz"
            HASH=$(nix-prefetch-url --type sha256 "$URL" 2>/dev/null | xargs nix hash convert --hash-algo sha256 --to sri)
            sed -i "/kakehashi = mkBinaryRelease/,/^  };/{s|\"${NIX_SYSTEM}\" = \"sha256-[^\"]*\"|\"${NIX_SYSTEM}\" = \"${HASH}\"|}" "$OVERLAY"
          done

      - name: Update octorus hashes
        if: steps.detect.outputs.has_octorus == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_octorus }}
        run: |
          OVERLAY="nix/overlays/binary-releases.nix"

          # Compute hashes for each platform
          for platform in "aarch64-apple-darwin:aarch64-darwin" "x86_64-apple-darwin:x86_64-darwin" \
                          "aarch64-unknown-linux-gnu:aarch64-linux" "x86_64-unknown-linux-gnu:x86_64-linux"; do
            PLAT_NAME="${platform%%:*}"
            NIX_SYSTEM="${platform##*:}"
            URL="https://github.com/ushironoko/octorus/releases/download/v${VERSION}/octorus-${VERSION}-${PLAT_NAME}.tar.gz"
            HASH=$(nix-prefetch-url --type sha256 "$URL" 2>/dev/null | xargs nix hash convert --hash-algo sha256 --to sri)
            sed -i "/octorus = mkBinaryRelease/,/^  };/{s|\"${NIX_SYSTEM}\" = \"sha256-[^\"]*\"|\"${NIX_SYSTEM}\" = \"${HASH}\"|}" "$OVERLAY"
          done

      - name: Update dcd hashes
        if: steps.detect.outputs.has_dcd == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_dcd }}
        run: |
          OVERLAY="nix/overlays/binary-releases.nix"

          # Compute hashes for each platform
          for platform in "osx-aarch64:aarch64-darwin" "osx-x86_64:x86_64-darwin" \
                          "linux-aarch64:aarch64-linux" "linux-x86_64:x86_64-linux"; do
            PLAT_NAME="${platform%%:*}"
            NIX_SYSTEM="${platform##*:}"
            URL="https://github.com/dlang-community/DCD/releases/download/v${VERSION}/dcd-v${VERSION}-${PLAT_NAME}.tar.gz"
            HASH=$(nix-prefetch-url --type sha256 "$URL" 2>/dev/null | xargs nix hash convert --hash-algo sha256 --to sri)
            sed -i "/dcd = mkBinaryRelease/,/^  };/{s|\"${NIX_SYSTEM}\" = \"sha256-[^\"]*\"|\"${NIX_SYSTEM}\" = \"${HASH}\"|}" "$OVERLAY"
          done

      - name: Update rgx-cli hashes
        if: steps.detect.outputs.has_rgx_cli == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_rgx_cli }}
        run: |
          OVERLAY="nix/overlays/binary-releases.nix"

          # Compute hashes for each platform
          for platform in "aarch64-apple-darwin:aarch64-darwin" "x86_64-apple-darwin:x86_64-darwin" \
                          "aarch64-unknown-linux-gnu:aarch64-linux" "x86_64-unknown-linux-gnu:x86_64-linux"; do
            PLAT_NAME="${platform%%:*}"
            NIX_SYSTEM="${platform##*:}"
            URL="https://github.com/brevity1swos/rgx/releases/download/v${VERSION}/rgx-cli-${PLAT_NAME}.tar.xz"
            HASH=$(nix-prefetch-url --type sha256 "$URL" 2>/dev/null | xargs nix hash convert --hash-algo sha256 --to sri)
            sed -i "/rgx-cli = mkBinaryRelease/,/^  };/{s|\"${NIX_SYSTEM}\" = \"sha256-[^\"]*\"|\"${NIX_SYSTEM}\" = \"${HASH}\"|}" "$OVERLAY"
          done

      - name: Update win32yank hashes
        if: steps.detect.outputs.has_win32yank == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_win32yank }}
        run: |
          OVERLAY="nix/overlays/standalone.nix"
          URL="https://github.com/equalsraf/win32yank/releases/download/v${VERSION}/win32yank-x64.zip"
          # fetchzip uses unpacked hash (--unpack)
          HASH=$(nix-prefetch-url --unpack --type sha256 "$URL" 2>/dev/null | xargs nix hash convert --hash-algo sha256 --to sri)
          sed -i "/win32yank = _final: prev:/,/^  };/{s|hash = \"sha256-[^\"]*\";|hash = \"${HASH}\";|}" "$OVERLAY"

      - name: Update x-api-playground hashes
        if: steps.detect.outputs.has_x_api_playground == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version_x_api_playground }}
        run: |
          OVERLAY="nix/overlays/source-builds.nix"

          # Compute GitHub source hash
          SRC_HASH=$(nix-prefetch-url --unpack --type sha256 \
            "https://github.com/xdevplatform/playground/archive/refs/tags/v${VERSION}.tar.gz" 2>/dev/null | \
            xargs nix hash convert --hash-algo sha256 --to sri)
          sed -i "/x-api-playground = _final: prev: {/,/^  };/{s|hash = \"sha256-[^\"]*\";|hash = \"${SRC_HASH}\";|}" "$OVERLAY"

          # Compute vendorHash using FOD trick
          FAKE_HASH="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          sed -i "/x-api-playground = _final: prev: {/,/^  };/{s|vendorHash = \"sha256-[^\"]*\";|vendorHash = \"${FAKE_HASH}\";|}" "$OVERLAY"
          VENDOR_HASH=$(nix build --no-link --impure --expr '
            let pkgs = import (builtins.getFlake "nixpkgs") {
              system = "x86_64-linux";
              overlays = [ (import ./nix/overlays).x-api-playground ];
            };
            in pkgs.x-api-playground
          ' 2>&1 | grep -oP "got:\s+\Ksha256-\S+" | head -1)
          if [ -n "$VENDOR_HASH" ]; then
            sed -i "/x-api-playground = _final: prev: {/,/^  };/{s|vendorHash = \"sha256-[^\"]*\";|vendorHash = \"${VENDOR_HASH}\";|}" "$OVERLAY"
          else
            echo "::error::Failed to compute vendorHash for x-api-playground"
            exit 1
          fi

      - name: Format code
        run: nix fmt -- .

      - name: Verify all hashes in overlay
        run: |
          ERRORS=0

          verify_hash() {
            local pkg="$1" url="$2" nix_system="$3" overlay="$4"
            local actual
            actual=$(nix-prefetch-url --type sha256 "$url" 2>/dev/null | xargs nix hash convert --hash-algo sha256 --to sri)
            if [ -z "$actual" ]; then
              echo "::warning::$pkg ($nix_system): could not fetch $url"
              return
            fi

            # Extract hash from overlay for this package and system
            local expected
            expected=$(sed -n "/^\s*${pkg} = /,/^  };/{/\"${nix_system}\" = \"sha256-/s/.*\"sha256-\([^\"]*\)\".*/sha256-\1/p}" "$overlay" | head -1)
            if [ -z "$expected" ]; then
              echo "::warning::$pkg ($nix_system): no hash found in overlay"
              return
            fi

            if [ "$actual" != "$expected" ]; then
              echo "::error::$pkg ($nix_system): hash mismatch! overlay=$expected actual=$actual"
              ERRORS=$((ERRORS + 1))
            else
              echo "$pkg ($nix_system): OK"
            fi
          }

          BINARY="nix/overlays/binary-releases.nix"
          STANDALONE="nix/overlays/standalone.nix"

          # termframe
          VER=$(sed -n '/termframe = mkBinaryRelease/,/^  };/{/version = "/s/.*"\(.*\)".*/\1/p}' "$BINARY" | head -1)
          for p in "macos-arm64:aarch64-darwin" "macos-x86_64:x86_64-darwin" "linux-arm64-gnu:aarch64-linux" "linux-x86_64-gnu:x86_64-linux"; do
            PLAT="${p%%:*}"; SYS="${p##*:}"
            verify_hash "termframe" "https://github.com/pamburus/termframe/releases/download/v${VER}/termframe-${PLAT}.tar.gz" "$SYS" "$BINARY"
          done

          # deck
          VER=$(sed -n '/deck = _final/,/^  };/{/version = "/s/.*"\(.*\)".*/\1/p}' "$STANDALONE" | head -1)
          for p in "darwin_arm64.zip:aarch64-darwin" "darwin_amd64.zip:x86_64-darwin" "linux_arm64.tar.gz:aarch64-linux" "linux_amd64.tar.gz:x86_64-linux"; do
            PLAT="${p%%:*}"; SYS="${p##*:}"
            verify_hash "deck" "https://github.com/k1LoW/deck/releases/download/v${VER}/deck_v${VER}_${PLAT}" "$SYS" "$STANDALONE"
          done

          # kakehashi
          VER=$(sed -n '/kakehashi = mkBinaryRelease/,/^  };/{/version = "/s/.*"\(.*\)".*/\1/p}' "$BINARY" | head -1)
          for p in "aarch64-apple-darwin:aarch64-darwin" "x86_64-apple-darwin:x86_64-darwin" "aarch64-unknown-linux-gnu:aarch64-linux" "x86_64-unknown-linux-gnu:x86_64-linux"; do
            PLAT="${p%%:*}"; SYS="${p##*:}"
            verify_hash "kakehashi" "https://github.com/atusy/kakehashi/releases/download/v${VER}/kakehashi-v${VER}-${PLAT}.tar.gz" "$SYS" "$BINARY"
          done

          # octorus
          VER=$(sed -n '/octorus = mkBinaryRelease/,/^  };/{/version = "/s/.*"\(.*\)".*/\1/p}' "$BINARY" | head -1)
          for p in "aarch64-apple-darwin:aarch64-darwin" "x86_64-apple-darwin:x86_64-darwin" "aarch64-unknown-linux-gnu:aarch64-linux" "x86_64-unknown-linux-gnu:x86_64-linux"; do
            PLAT="${p%%:*}"; SYS="${p##*:}"
            verify_hash "octorus" "https://github.com/ushironoko/octorus/releases/download/v${VER}/octorus-${VER}-${PLAT}.tar.gz" "$SYS" "$BINARY"
          done

          # dcd
          VER=$(sed -n '/dcd = mkBinaryRelease/,/^  };/{/version = "/s/.*"\(.*\)".*/\1/p}' "$BINARY" | head -1)
          for p in "osx-aarch64:aarch64-darwin" "osx-x86_64:x86_64-darwin" "linux-aarch64:aarch64-linux" "linux-x86_64:x86_64-linux"; do
            PLAT="${p%%:*}"; SYS="${p##*:}"
            verify_hash "dcd" "https://github.com/dlang-community/DCD/releases/download/v${VER}/dcd-v${VER}-${PLAT}.tar.gz" "$SYS" "$BINARY"
          done

          # rgx-cli
          VER=$(sed -n '/rgx-cli = mkBinaryRelease/,/^  };/{/version = "/s/.*"\(.*\)".*/\1/p}' "$BINARY" | head -1)
          for p in "aarch64-apple-darwin:aarch64-darwin" "x86_64-apple-darwin:x86_64-darwin" "aarch64-unknown-linux-gnu:aarch64-linux" "x86_64-unknown-linux-gnu:x86_64-linux"; do
            PLAT="${p%%:*}"; SYS="${p##*:}"
            verify_hash "rgx-cli" "https://github.com/brevity1swos/rgx/releases/download/v${VER}/rgx-cli-${PLAT}.tar.xz" "$SYS" "$BINARY"
          done

          # claude-code
          VER=$(sed -n '/claude-code = mkBinaryRelease/,/^  };/{/version = "/s/.*"\(.*\)".*/\1/p}' "$BINARY" | head -1)
          for p in "darwin-arm64:aarch64-darwin" "darwin-x64:x86_64-darwin" "linux-arm64:aarch64-linux" "linux-x64:x86_64-linux"; do
            PLAT="${p%%:*}"; SYS="${p##*:}"
            verify_hash "claude-code" "https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases/${VER}/${PLAT}/claude" "$SYS" "$BINARY"
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::${ERRORS} hash mismatch(es) found. The sed-based hash update likely failed."
            exit 1
          fi
          echo "All hashes verified successfully."

      - name: Commit and push changes
        env:
          PACKAGES: ${{ steps.detect.outputs.packages }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add -A
            git commit -m "fix: update nix hashes for $PACKAGES"
            git push
          fi

  check:
    name: Check
    needs: update-hashes
    permissions:
      contents: read
    if: always() && needs.update-hashes.result != 'failure' && needs.update-hashes.result != 'cancelled'
    uses: ./.github/workflows/check.yml
    with:
      ref: ${{ github.head_ref }}
    secrets:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
