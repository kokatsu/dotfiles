name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: Format check
    # Renovate PRの場合はUpdate Nix Hashesからのworkflow_callを待つ
    if: github.actor != 'renovate[bot]' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: kokatsu
      - name: Check formatting
        run: nix fmt -- --check .

  hash-patterns:
    name: Hash update patterns
    if: github.actor != 'renovate[bot]' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify sed patterns match overlay file
        run: bash scripts/test-hash-patterns.sh
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
      - name: Verify Renovate regex patterns match overlay files
        run: deno run --allow-read scripts/test-renovate-patterns.ts

  build-linux:
    name: Build (Linux)
    if: github.actor != 'renovate[bot]' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: kokatsu
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build devShell
        run: nix build .#devShells.x86_64-linux.default
      - name: Build home-manager config
        run: nix build .#homeConfigurations.ci-linux.activationPackage

  build-darwin:
    name: Build (macOS)
    if: github.actor != 'renovate[bot]' || github.event_name == 'workflow_call'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: kokatsu
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build devShell
        run: nix build .#devShells.aarch64-darwin.default
      - name: Build home-manager config
        run: nix build .#homeConfigurations.ci-darwin.activationPackage
