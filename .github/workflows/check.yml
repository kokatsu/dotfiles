name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: Format check
    # Renovate PRの場合はUpdate Nix Hashesからのworkflow_callを待つ
    if: github.actor != 'renovate[bot]' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      # DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/nix-installer-action@1e3c5df3156622df83bb8f5c467619557d02e284
      # cachix/cachix-action@v16
      - uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1
        with:
          name: kokatsu
      - name: Check formatting
        run: nix fmt -- --check .

  hash-patterns:
    name: Hash update patterns
    if: github.actor != 'renovate[bot]' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Verify sed patterns match overlay file
        run: bash scripts/test-hash-patterns.sh

  build-linux:
    name: Build (Linux)
    if: github.actor != 'renovate[bot]' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      # DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/nix-installer-action@1e3c5df3156622df83bb8f5c467619557d02e284
      # cachix/cachix-action@v16
      - uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1
        with:
          name: kokatsu
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build devShell
        run: nix build .#devShells.x86_64-linux.default
      - name: Build home-manager config
        run: nix build .#homeConfigurations.ci-linux.activationPackage

  build-darwin:
    name: Build (macOS)
    if: github.actor != 'renovate[bot]' || github.event_name == 'workflow_call'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      # DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/nix-installer-action@1e3c5df3156622df83bb8f5c467619557d02e284
      # cachix/cachix-action@v16
      - uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1
        with:
          name: kokatsu
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build devShell
        run: nix build .#devShells.aarch64-darwin.default
      - name: Build home-manager config
        run: nix build .#homeConfigurations.ci-darwin.activationPackage
