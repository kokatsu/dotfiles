name: Check

on:
  push:
    branches: [main]
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout (defaults to event ref)'
        required: false
        type: string
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true

concurrency:
  group: check-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: kokatsu
      - name: Check formatting
        run: nix fmt -- --check .

  hash-patterns:
    name: Hash update patterns
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: Verify sed patterns match overlay file
        run: bash scripts/test-hash-patterns.sh
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
      - name: Verify Renovate regex patterns match overlay files
        run: deno run --allow-read scripts/test-renovate-patterns.ts

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Run shellcheck
        # Backstop for the lefthook pre-commit/pre-push gate, which can be bypassed
        # with --no-verify. Runs the justfile recipe so `sh_files` stays the single
        # source of truth; tools are pinned via flake.lock (--inputs-from).
        run: nix shell --inputs-from . nixpkgs#just nixpkgs#shellcheck --command just shellcheck

  deno-check:
    name: Deno check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Type-check Deno TypeScript
        # Backstop for the Lefthook pre-commit/pre-push gate (bypassable with
        # --no-verify) and for type errors that otherwise surface only when these
        # hooks run at session runtime. Runs the justfile recipe so
        # `deno_dirs`/`deno_files` stay the single source of truth; tools are
        # pinned via flake.lock (--inputs-from).
        run: nix shell --inputs-from . nixpkgs#just nixpkgs#deno --command just deno-check

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: Audit npm lockfiles
        run: |
          failed=0
          for dir in nix/npm-locks/*/; do
            if [ -f "$dir/package-lock.json" ]; then
              echo "::group::Auditing $dir"
              (cd "$dir" && npm audit --audit-level=high) || failed=1
              echo "::endgroup::"
            fi
          done
          exit $failed

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: kokatsu
          authToken: ${{ github.ref == 'refs/heads/main' && secrets.CACHIX_AUTH_TOKEN || '' }}
      - name: Build devShell
        run: nix build --fallback .#devShells.x86_64-linux.default
      - name: Build home-manager config
        run: nix build --fallback .#homeConfigurations.ci-linux.activationPackage
      - name: Test Neovim custom plugins
        run: nix develop --command nvim --headless --clean -l scripts/test-nvim-config.lua

  build-darwin:
    name: Build (macOS)
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: kokatsu
          authToken: ${{ github.ref == 'refs/heads/main' && secrets.CACHIX_AUTH_TOKEN || '' }}
      - name: Build devShell
        run: nix build --fallback .#devShells.aarch64-darwin.default
      - name: Build home-manager config
        run: nix build --fallback .#homeConfigurations.ci-darwin.activationPackage
