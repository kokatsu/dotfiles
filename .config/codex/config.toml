approval_policy = "on-request"
sandbox_mode = "workspace-write"

[features]
codex_git_commit = true

[sandbox_workspace_write]
network_access = false

[tools]
web_search = { context_size = "medium", location = { country = "JP", timezone = "Asia/Tokyo" } }

[tui]
notifications = true
notification_condition = "always"
status_line = [
  "model-with-reasoning",
  "context-remaining",
  "context-used",
  "five-hour-limit",
  "weekly-limit",
  "codex-version",
  "context-window-size",
  "used-tokens",
  "total-input-tokens",
  "total-output-tokens",
]

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"
