"$schema" = "https://starship.rs/config-schema.json"

add_newline = true

command_timeout = 1000

format = """
$directory\
$git_branch\
$git_metrics\
$git_status\
$fill\
${custom.disk}\
$cmd_duration\
$time\
$line_break\
$battery\
$character"""

# format
# https://www.nerdfonts.com/cheat-sheet

[directory]
truncation_symbol = "ïپ¼ " # nf-fa-folder_open
truncate_to_repo = false
home_symbol = "ï€• ~" # nf-fa-home
read_only = " ï€£ " # nf-fa-lock
format = """
[î‚؛](fg:lavender)\
[$path]($style)\
[$read_only]($read_only_style)\
[î‚¼](fg:lavender)\
""" # nf-ple-lower_right_triangle nf-ple-upper_left_triangle
style = "bold fg:surface0 bg:lavender"
read_only_style = "bold fg:surface0 bg:lavender"

[git_branch]
symbol = "ïگک "
truncation_symbol = ""
style = "bold fg:sky bg:surface1"
format = """
[î‚؛](fg:surface1)\
[$symbol$branch(:$remote_branch)]($style)\
""" # nf-ple-lower_right_triangle

[git_metrics]
disabled = false
added_style = "bold fg:green bg:surface1"
deleted_style = "bold fg:blue  bg:surface1"
format = """
[ َ°؟ں ï‘€ ](fg:sky bg:surface1)\
[+$added]($added_style)[-$deleted]($deleted_style)\
""" # nf-md-slash_forward nf-md-plus_minus

[git_status]
conflicted = "َ°‍‡ " # nf-md-sword_cross
ahead = "ïƒ® أ— ${count} " # nf-fa-cloud_arrow_up
behind = "ïƒ­ أ— ${count} " # nf-fa-cloud_arrow_down
diverged = "ïƒ® أ—${ahead_count} ïƒ­ أ—${behind_count} " # nf-fa-cloud_arrow_up nf-fa-cloud_arrow_down
untracked = "َ°›‘ أ—${count} " # nf-md-eye_off_outline
stashed = "َ°›ھ " # nf-md-lock_pattern
modified = "َ°ڈ« أ—${count} " # nf-md-pencil
staged = "َ°„´ أ—${count} " # nf-md-checkbox_marked_circle_outline
renamed = "َ°پ” أ—${count} " # nf-md-arrow_right
deleted = "َ°®ک أ—${count} " # nf-md-file_remove
style = "bold fg:maroon bg:surface1"
format = """
[ َ°؟ں î¸½ ](fg:sky bg:surface1)\
[$all_status$ahead_behind]($style)\
[î‚¼](fg:surface1)\
""" # nf-md-slash_forward nf-fa-file_arrow_up

[fill]
symbol = " "

[cmd_duration]
show_milliseconds = true
min_time = 100
format = '[َ°‍Œ $duration  ](fg:yellow)' # nf-md-timer_sand_full

[time]
disabled = false
format = '[ïگ؛ $time](bold fg:overlay0)' # nf-oct-clock
time_format = '%T'

[battery]
full_symbol = "ï‰€  "        # nf-fa-battery_full
charging_symbol = "ï‡¦  "    # nf-fa-plug
discharging_symbol = "ï‰‚  " # nf-fa-battery_half
empty_symbol = "ï‰„  "       # nf-fa-battery_empty

[[battery.display]]
threshold = 100
style = "bold green"

[[battery.display]]
threshold = 50
style = "bold yellow"

[[battery.display]]
threshold = 20
style = "bold red"

[custom.disk]
command = "df -h /mnt/c | awk 'NR==2 {print $5}'"
when = "test -d /mnt/c && test $(df /mnt/c | awk 'NR==2 {print $5}' | tr -d '%') -gt 80"
symbol = "َ°‹ٹ "                                                                            # nf-md-harddisk
style = "bold red"
format = "[$symbol$output]($style) "

[character]
success_symbol = "[ï€Œ](bold green)" # nf-fa-check
error_symbol = "[ï€چ](bold red)"     # nf-fa-times
