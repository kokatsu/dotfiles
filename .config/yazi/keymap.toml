[[mgr.prepend_keymap]]
on = "l"
run = "plugin smart-enter"
desc = "Enter directory or open file"

[[mgr.prepend_keymap]]
on = "<Enter>"
run = "plugin smart-enter"
desc = "Enter directory or open file"

[[mgr.prepend_keymap]]
on = "f"
run = "plugin smart-filter"
desc = "Smart filter"

[[mgr.prepend_keymap]]
on = "<C-h>"
run = "hidden toggle"
desc = "Toggle hidden files"

[[mgr.prepend_keymap]]
on = "T"
run = "plugin toggle-pane max-preview"
desc = "Maximize or restore the preview pane"

[[mgr.prepend_keymap]]
on = "S"
run = "shell '$SHELL' --block --confirm"
desc = "Open shell here"

[[mgr.prepend_keymap]]
on = "e"
run = "shell '$EDITOR \"$@\"' --block --confirm"
desc = "Edit with $EDITOR"

[[mgr.prepend_keymap]]
on = "b"
run = '''shell 'if command -v wslview >/dev/null 2>&1; then wslview "$@"; elif [ "$(uname)" = "Darwin" ]; then open "$@"; else xdg-open "$@"; fi' --orphan --confirm'''
desc = "Open with default app"

[[mgr.prepend_keymap]]
on = ["g", "s"]
run = "plugin vcs-files"
desc = "List Git-changed files"

[[mgr.prepend_keymap]]
on = ["g", "j"]
run = '''shell 'root=$(git rev-parse --show-toplevel 2>/dev/null) || exit 0; cd "$root" || exit 0; sel=$(git -c core.quotePath=false status --porcelain | fzf --no-multi --layout=reverse --border --prompt="git changes> " --preview "git diff --color=always -- {2..}") || exit 0; [ -n "$sel" ] || exit 0; rel=${sel#???}; case "$rel" in *" -> "*) rel=${rel##* -> } ;; esac; ya emit reveal "$root/$rel"' --block --confirm'''
desc = "Jump to a Git-changed file (fzf)"

[[mgr.prepend_keymap]]
on = "+"
run = "plugin zoom 1"
desc = "Zoom in hovered file"

[[mgr.prepend_keymap]]
on = "-"
run = "plugin zoom -1"
desc = "Zoom out hovered file"
