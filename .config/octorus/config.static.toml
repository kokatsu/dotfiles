editor = "nvim"

[diff]
theme = "__CATPPUCCIN_THEME__"
bg_color = true
tab_width = 4

[keybindings]
approve = "a"
request_changes = "r"
comment = "c"
suggestion = "s"

[ai]
reviewer = "claude"
reviewee = "claude"
max_iterations = 10
timeout_secs = 600
reviewee_additional_tools = ["Skill"]

[shell]
timeout_secs = 60
